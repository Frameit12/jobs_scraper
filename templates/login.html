<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login — Find Me A Job</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/theme.css">
</head>
<body>
<div class="cw-auth-page">
    <div class="cw-auth-brand">Find Me A Job</div>
    <div class="cw-auth-tagline">Skip the scrolling. Filter to your perfect job.</div>

    <div class="cw-auth-card">
        <div class="cw-auth-title">Welcome back</div>
        <div class="cw-auth-subtitle">Sign in to your account to continue</div>

        {% if error %}
            <div class="cw-alert cw-alert-error">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="cw-alert cw-alert-success">{{ success }}</div>
        {% endif %}

        <form method="POST">
            <div class="cw-form-group">
                <label class="cw-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="cw-input" required autofocus>
            </div>
            <div class="cw-form-group">
                <label class="cw-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="cw-input" required>
            </div>
            <button type="submit" class="cw-btn">Sign in</button>
        </form>

        <hr class="cw-divider">

        <div class="cw-auth-footer">
            <a href="/forgot-password">Forgot your password?</a>
        </div>
        <div class="cw-auth-footer" style="margin-top:10px;">
            Don't have an account? <a href="/signup">Sign up</a>
        </div>
    </div>
</div>
</body>
</html>
