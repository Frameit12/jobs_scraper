<!DOCTYPE html>
<html lang="en">
<head>
    <title>Forgot Password — Find Me A Job</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/theme.css">
</head>
<body>
<div class="cw-auth-page">
    <div class="cw-auth-brand">Find Me A Job</div>
    <div class="cw-auth-tagline">Skip the scrolling. Filter to your perfect job.</div>

    <div class="cw-auth-card">
        <div class="cw-auth-title">Reset your password</div>
        <div class="cw-auth-subtitle">
            Enter your email address and we'll send you instructions to reset your password.
        </div>

        {% if error %}
            <div class="cw-alert cw-alert-error">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="cw-alert cw-alert-success">{{ success }}</div>
        {% endif %}

        {% if not success %}
        <form method="POST">
            <div class="cw-form-group">
                <label class="cw-label" for="email">Email address</label>
                <input type="email" id="email" name="email" class="cw-input" required autofocus>
            </div>
            <button type="submit" class="cw-btn">Send reset instructions</button>
        </form>
        {% endif %}

        <hr class="cw-divider">

        <div class="cw-auth-footer">
            <a href="/login">← Back to sign in</a>
        </div>
    </div>
</div>
</body>
</html>
