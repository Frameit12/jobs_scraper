<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign Up — Find Me A Job</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/theme.css">
</head>
<body>
<div class="cw-auth-page">
    <div class="cw-auth-brand">Find Me A Job</div>
    <div class="cw-auth-tagline">Skip the scrolling. Filter to your perfect job.</div>

    <div class="cw-auth-card">
        <div class="cw-auth-title">Create your account</div>
        <div class="cw-auth-subtitle">Get started — it only takes a minute</div>

        {% if error %}
            <div class="cw-alert cw-alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="cw-form-group">
                <label class="cw-label" for="email">Email address</label>
                <input type="email" id="email" name="email" class="cw-input" required autofocus>
                <div class="cw-hint">We'll send your scheduled job results here</div>
            </div>
            <div class="cw-form-group">
                <label class="cw-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="cw-input" required>
                <div class="cw-hint">Choose a unique username</div>
            </div>
            <div class="cw-form-group">
                <label class="cw-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="cw-input" required>
            </div>
            <button type="submit" class="cw-btn">Create account</button>
        </form>

        <hr class="cw-divider">

        <div class="cw-auth-footer">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</div>
</body>
</html>
